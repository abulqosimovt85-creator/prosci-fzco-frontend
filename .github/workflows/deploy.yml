name: Build & Deploy Frontend to Beget

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Beget via FTP (full sync)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: doom1.beget.com
          username: ${{ secrets.BEGET_FTP_USER }}
          password: ${{ secrets.BEGET_FTP_PASS }}
          local-dir: dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          exclude: |
            **/uploads/**
